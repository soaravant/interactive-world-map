<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Χριστός Ανέστη</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23f97316'/%3E%3Cpath d='M32 13l4 10 11 1-8 7 2 11-9-5-9 5 2-11-8-7 11-1z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./style.css?v=2">
    <link rel="stylesheet" href="./slideshow.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div id="globeViz"></div>
        <div id="atmosphere-overlay"></div>

        <div id="loader" class="glass-panel">
            <div class="spinner"></div>
            <p>Φόρτωση χάρτη...</p>
        </div>

        <div id="info-modal" class="glass-panel hidden">
            <button id="close-modal" aria-label="Κλείσιμο">&times;</button>
            <div class="modal-content">
                <div class="country-header">
                    <h2 id="country-name">Χώρα</h2>
                    <div class="country-header-actions">
                        <div id="country-flag" class="flag-placeholder"></div>
                    </div>
                </div>

                <div class="greeting-card">
                    <div class="phrase-header">
                        <span class="phrase-label">Χριστός Ανέστη</span>
                        <button id="audio-greeting" class="audio-btn inline-audio-btn" type="button" aria-label="Αναπαραγωγή Χριστός Ανέστη">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M14 3.23v17.54a1 1 0 0 1-1.64.77L7.78 18H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h3.78l4.58-3.54A1 1 0 0 1 14 3.23Zm4.19 2.39a1 1 0 0 1 1.41 0 9 9 0 0 1 0 12.72 1 1 0 0 1-1.41-1.42 7 7 0 0 0 0-9.88 1 1 0 0 1 0-1.42Zm-2.83 2.83a1 1 0 0 1 1.41 0 5 5 0 0 1 0 7.08 1 1 0 1 1-1.41-1.42 3 3 0 0 0 0-4.24 1 1 0 0 1 0-1.42Z" />
                            </svg>
                        </button>
                    </div>
                    <p id="greeting-text" class="phrase-text">Χριστός Ανέστη!</p>
                    <p id="greeting-pronunciation" class="phrase-pronunciation">Χριστός Ανέστη!</p>
                </div>

                <div class="greeting-card secondary">
                    <div class="phrase-header">
                        <span class="phrase-label">Αληθώς Ανέστη</span>
                        <button id="audio-response" class="audio-btn inline-audio-btn" type="button" aria-label="Αναπαραγωγή Αληθώς Ανέστη">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M14 3.23v17.54a1 1 0 0 1-1.64.77L7.78 18H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h3.78l4.58-3.54A1 1 0 0 1 14 3.23Zm4.19 2.39a1 1 0 0 1 1.41 0 9 9 0 0 1 0 12.72 1 1 0 0 1-1.41-1.42 7 7 0 0 0 0-9.88 1 1 0 0 1 0-1.42Zm-2.83 2.83a1 1 0 0 1 1.41 0 5 5 0 0 1 0 7.08 1 1 0 1 1-1.41-1.42 3 3 0 0 0 0-4.24 1 1 0 0 1 0-1.42Z" />
                            </svg>
                        </button>
                    </div>
                    <p id="response-text" class="phrase-text">Αληθώς Ανέστη!</p>
                    <p id="response-pronunciation" class="phrase-pronunciation">Αληθώς Ανέστη!</p>
                </div>

                <div id="country-slideshow" class="slideshow" style="display: none;">
                    <div class="slideshow-track" id="slideshow-track"></div>
                    <div class="slideshow-controls">
                        <button id="slide-prev" class="slide-btn" type="button" aria-label="Προηγούμενη εικόνα">&lsaquo;</button>
                        <div class="slide-dots" id="slide-dots"></div>
                        <button id="slide-next" class="slide-btn" type="button" aria-label="Επόμενη εικόνα">&rsaquo;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.45.3"></script>
    <script type="module" src="./script.js?v=2"></script>
</body>

</html>
